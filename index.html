<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤقت العد التنازلي الاحترافي</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger-color: #ef4444;
            --success-color: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: var(--text-main);
            font-weight: 600;
        }

        /* Inputs Styling */
        .inputs-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 35px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .input-group label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            font-size: 1.5rem;
            color: var(--accent-color);
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        .input-group input::-webkit-outer-spin-button,
        .input-group input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Display Styling */
        .timer-display {
            font-size: 4.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin-bottom: 35px;
            letter-spacing: 2px;
            color: var(--text-main);
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            transition: all 0.3s ease;
        }

        .timer-display.running {
            color: var(--accent-color);
        }

        .timer-display.finished {
            color: var(--danger-color);
            animation: pulse 1s infinite alternate;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.03); }
        }

        /* Controls Styling */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 1;
        }

        .btn-start {
            background-color: var(--accent-color);
            color: #0f172a;
        }

        .btn-start:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-pause {
            background-color: #475569;
            color: var(--text-main);
        }

        .btn-pause:hover {
            background-color: #64748b;
            transform: translateY(-2px);
        }

        .btn-reset {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-reset:hover {
            background-color: rgba(239, 68, 68, 0.2);
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        audio {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>مؤقت العد التنازلي</h1>
        
        <div class="inputs-container" id="inputsForm">
            <div class="input-group">
                <label for="hoursInput">ساعات</label>
                <input type="number" id="hoursInput" min="0" max="99" value="0" placeholder="00">
            </div>
            <div class="input-group">
                <label for="minutesInput">دقائق</label>
                <input type="number" id="minutesInput" min="0" max="59" value="5" placeholder="00">
            </div>
            <div class="input-group">
                <label for="secondsInput">ثواني</label>
                <input type="number" id="secondsInput" min="0" max="59" value="0" placeholder="00">
            </div>
        </div>

        <div class="timer-display" id="timerDisplay">00:05:00</div>

        <div class="controls">
            <button class="btn-start" id="startBtn">بدء</button>
            <button class="btn-pause" id="pauseBtn" disabled>إيقاف مؤقت</button>
            <button class="btn-reset" id="resetBtn">إعادة تعيين</button>
        </div>
    </div>

    <audio id="alarmSound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto" loop></audio>

    <script>
        let countdown;
        let totalSecondsRemaining = 0;
        let isRunning = false;

        const hoursInput = document.getElementById('hoursInput');
        const minutesInput = document.getElementById('minutesInput');
        const secondsInput = document.getElementById('secondsInput');
        const timerDisplay = document.getElementById('timerDisplay');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const alarmSound = document.getElementById('alarmSound');

        function updateDisplayFromInputs() {
            if (isRunning) return;
            const h = String(Math.max(0, parseInt(hoursInput.value) || 0)).padStart(2, '0');
            const m = String(Math.max(0, Math.min(59, parseInt(minutesInput.value) || 0))).padStart(2, '0');
            const s = String(Math.max(0, Math.min(59, parseInt(secondsInput.value) || 0))).padStart(2, '0');
            timerDisplay.textContent = `${h}:${m}:${s}`;
        }

        [hoursInput, minutesInput, secondsInput].forEach(input => {
            input.addEventListener('input', updateDisplayFromInputs);
        });

        function displayTime(totalSeconds) {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            timerDisplay.textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function startTimer() {
            if (isRunning) return;

            if (totalSecondsRemaining <= 0) {
                const hrs = parseInt(hoursInput.value) || 0;
                const mins = parseInt(minutesInput.value) || 0;
                const secs = parseInt(secondsInput.value) || 0;
                totalSecondsRemaining = (hrs * 3600) + (mins * 60) + secs;
            }

            if (totalSecondsRemaining <= 0) return;

            isRunning = true;
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            hoursInput.disabled = true;
            minutesInput.disabled = true;
            secondsInput.disabled = true;

            timerDisplay.classList.add('running');
            timerDisplay.classList.remove('finished');

            countdown = setInterval(() => {
                totalSecondsRemaining--;
                displayTime(totalSecondsRemaining);

                if (totalSecondsRemaining <= 0) {
                    clearInterval(countdown);
                    timerDisplay.classList.remove('running');
                    timerDisplay.classList.add('finished');
                    isRunning = false;
                    startBtn.disabled = true;
                    pauseBtn.disabled = true;
                    try { alarmSound.play(); } catch (e) { console.log("Audio playing blocked"); }
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!isRunning) return;
            clearInterval(countdown);
            isRunning = false;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            timerDisplay.classList.remove('running');
        }

        function resetTimer() {
            clearInterval(countdown);
            isRunning = false;
            totalSecondsRemaining = 0;
            hoursInput.disabled = false;
            minutesInput.disabled = false;
            secondsInput.disabled = false;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            timerDisplay.classList.remove('running', 'finished');
            alarmSound.pause();
            alarmSound.currentTime = 0;
            updateDisplayFromInputs();
        }

        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);

        updateDisplayFromInputs();
    </script>
</body>
</html>
